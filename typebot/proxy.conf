# Tiny reverse proxy in front of the Typebot builder. Sole job: strip the builder's
# `X-Frame-Options: SAMEORIGIN` header so the studio dashboard (different port = different origin)
# can embed the builder in an iframe at /flows. The builder's CSP has no `frame-ancestors`, so
# removing X-Frame-Options is sufficient to allow framing. Everything else passes straight through
# (same origin as the builder, so /_next assets, /api/auth callbacks and websockets all resolve here).
#
# NOTE: proxy_pass uses a VARIABLE + Docker's embedded resolver (127.0.0.11) so nginx re-resolves the
# builder's IP per request. Without this, nginx caches the IP at startup and breaks whenever the
# builder container is recreated (it gets a new IP) — which manifested as 404s served by whichever
# container inherited the stale IP.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 50m;          # allow media uploads in the builder
    resolver 127.0.0.11 valid=30s;     # Docker embedded DNS; re-resolve the builder per request

    location / {
        set $builder typebot-builder;
        proxy_pass http://$builder:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;     # websocket support (realtime builder)
        proxy_set_header Connection        $connection_upgrade;
        proxy_hide_header X-Frame-Options;                    # <- the whole point: allow embedding
        proxy_read_timeout 300s;
    }
}
