# Mautic — open-source marketing-automation / funnel engine for the studio (§ funnels).
# ─────────────────────────────────────────────────────────────────────────────
# Sibling stack (mirrors chatwoot/ and postiz/). Owns the OUTBOUND funnel lane (contacts,
# segments, scoring, drip campaigns, landing pages, forms, email/SMS); Chatwoot keeps the
# inbox/social-DM lane and the studio keeps content creation. See docs/mautic-integration.md.
#
# Manage:
#   docker compose --project-directory mautic -f mautic/docker-compose.yml --env-file mautic/.env up -d
# First-run install (schema + admin) is a one-off CLI step (see docs/mautic-integration.md).
#
# Free + self-hosted (GPL-3.0). Two things reach OUTSIDE the box: email DELIVERY needs an SMTP
# relay/SES, and public landing pages/forms need a public URL. The engine itself runs local.
#
# IMPORTANT: the image declares /var/www/html/{config,docroot/media/*,var/logs} as Dockerfile
# VOLUMEs, so they MUST be mounted as explicit shared named volumes — otherwise web + cron each
# get their own anonymous config volume and never see the same local.php (the install breaks).

services:
  mautic-db:
    image: mariadb:11.4                       # pinned; verify the current stable before changes
    container_name: mautic-db
    restart: unless-stopped
    environment:
      - MARIADB_ROOT_PASSWORD=${MAUTIC_DB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MAUTIC_DB_NAME:-mautic}
      - MARIADB_USER=${MAUTIC_DB_USER:-mautic}
      - MARIADB_PASSWORD=${MAUTIC_DB_PASSWORD}
    volumes:
      - mautic_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 5s
      retries: 10

  mautic:                                      # web UI + API (the funnel builder)
    image: mautic/mautic:${MAUTIC_TAG:-5-apache}   # verify + pin to the current stable digest
    container_name: mautic
    restart: unless-stopped
    depends_on:
      mautic-db:
        condition: service_healthy
    environment:
      - DOCKER_MAUTIC_ROLE=mautic_web
      - MAUTIC_DB_HOST=mautic-db
      - MAUTIC_DB_PORT=3306
      - MAUTIC_DB_DATABASE=${MAUTIC_DB_NAME:-mautic}
      - MAUTIC_DB_USER=${MAUTIC_DB_USER:-mautic}
      - MAUTIC_DB_PASSWORD=${MAUTIC_DB_PASSWORD}
      - MAUTIC_VOLUME_CONFIG=/var/www/html/config
      - MAUTIC_RUN_CRON_JOBS=false             # cron handled by the dedicated mautic-cron container
    volumes:
      - mautic_app:/var/www/html
      - mautic_config:/var/www/html/config                       # SHARED local.php (web + cron)
      - mautic_media_files:/var/www/html/docroot/media/files
      - mautic_media_images:/var/www/html/docroot/media/images
      - mautic_logs:/var/www/html/var/logs
    ports:
      - "4010:80"                              # LAN cockpit; put behind the same access model as the other admin UIs

  mautic-cron:                                 # runs segments/campaigns/email queue on a schedule
    image: mautic/mautic:${MAUTIC_TAG:-5-apache}
    container_name: mautic-cron
    restart: unless-stopped
    depends_on:
      - mautic
    environment:
      - DOCKER_MAUTIC_ROLE=mautic_cron
      - MAUTIC_DB_HOST=mautic-db
      - MAUTIC_DB_PORT=3306
      - MAUTIC_DB_DATABASE=${MAUTIC_DB_NAME:-mautic}
      - MAUTIC_DB_USER=${MAUTIC_DB_USER:-mautic}
      - MAUTIC_DB_PASSWORD=${MAUTIC_DB_PASSWORD}
      - MAUTIC_VOLUME_CONFIG=/var/www/html/config
    volumes:
      - mautic_app:/var/www/html
      - mautic_config:/var/www/html/config                       # same shared config as web
      - mautic_media_files:/var/www/html/docroot/media/files
      - mautic_media_images:/var/www/html/docroot/media/images
      - mautic_logs:/var/www/html/var/logs

volumes:
  mautic_app:
  mautic_config:
  mautic_media_files:
  mautic_media_images:
  mautic_logs:
  mautic_db_data:
