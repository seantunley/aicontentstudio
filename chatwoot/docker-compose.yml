# Chatwoot — self-hosted omnichannel engagement inbox (§3d). Isolated stack (own Postgres + Redis),
# mirroring how Postiz runs separately. Pinned off :latest. Secrets live in ./.env (gitignored).
# First run: bring up postgres+redis, then `docker compose run --rm rails bundle exec rails db:chatwoot_prepare`.
x-app: &app
  image: chatwoot/chatwoot:v4.14.2
  env_file: .env
  restart: unless-stopped
  volumes:
    - ./data/storage:/app/storage

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: chatwoot_production
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: chatwoot-redis
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --requirepass \"$$REDIS_PASSWORD\""]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data

  rails:
    <<: *app
    container_name: chatwoot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "4009:3000"          # LAN cockpit/inbox UI + the API the studio reads
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]

  sidekiq:
    <<: *app
    container_name: chatwoot-sidekiq
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
