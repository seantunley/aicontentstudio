# AI Content Studio — Phase 0 spine.
# Hermes Agent (brain + Telegram gateway) + a local SQLite studio job store.
# Goal: text a topic -> it logs a job -> it replies in persona. NOTHING publishes yet.
#
#   Bring up:   docker compose up -d
#   Configure:  docker compose exec -it hermes hermes setup        # personality, Telegram token + your user-ID allowlist
#               docker compose exec -it hermes hermes model        # -> OpenAI Codex (ChatGPT Plus/Pro device-code login)
#   Logs:       docker compose logs -f hermes
#
# Image is PINNED to a specific stable release (plan §4a, §12) — never :latest.
# Compose-level vars (tag, UID/GID) come from .env (gitignored); see .env.example.

services:
  hermes:
    image: nousresearch/hermes-agent:${HERMES_IMAGE_TAG:-v2026.6.5}
    container_name: hermes
    restart: unless-stopped              # auto-restart after crash/reboot (plan §9b)
    # Apply our idempotent in-image patches (clarify buttons show option text, not 1/2/3) as the
    # hermes user, then hand off to the gateway. Patch source lives in ./plugins (version-controlled);
    # it no-ops safely if a Hermes upgrade changes the target code. See plugins/patch_clarify.py.
    command: ["sh", "-lc", "/opt/hermes/.venv/bin/python /opt/data/plugins/patch_clarify.py || true; exec /opt/hermes/.venv/bin/hermes gateway run"]
    network_mode: host                   # per official Hermes compose; Telegram is outbound long-poll, no inbound port
    environment:
      - HERMES_UID=${HERMES_UID:-1000}   # own files written into the volumes as the host user
      - HERMES_GID=${HERMES_GID:-1000}
      - STUDIO_DRY_RUN=true              # §4 dry-run: true = no real post (logs only); false = publish via Postiz
      - STUDIO_DB_PATH=/opt/studio/studio.db
      # Model seam: the Studio's worker (research, drafting, polish, safety, tagging, scout) runs its
      # text generation on THIS model; leave empty to inherit Hermes' default (= the conversational
      # Telegram model). Set it to give the Studio its own, e.g. pricier, model — chat stays cheap.
      # Image/video models are configured separately (config.yaml image_gen.provider / video.provider).
      - STUDIO_TEXT_MODEL=${STUDIO_TEXT_MODEL:-}
      - STUDIO_TEXT_PROVIDER=${STUDIO_TEXT_PROVIDER:-}
      # § Claude brain seam (creative-director fit-check QA; later the drafting brain). auto = use the
      # `claude` CLI (your subscription, run `claude login` in the container) if present, else the
      # Anthropic API if a key is set, else off (graceful). See plugins/studio/claude.py.
      - STUDIO_BRAIN=${STUDIO_BRAIN:-auto}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - STUDIO_CLAUDE_MODEL=${STUDIO_CLAUDE_MODEL:-claude-sonnet-4-6}
      # Path B: the host claude-bridge (scripts/claude-bridge.py) exposes the host's authed `claude`
      # (your subscription) to the host-networked worker at 127.0.0.1. Also stored as DB settings so it
      # activates without a hermes restart. Token in the gitignored .env.
      - CLAUDE_BRIDGE_URL=${CLAUDE_BRIDGE_URL:-http://127.0.0.1:4014}
      - CLAUDE_BRIDGE_TOKEN=${CLAUDE_BRIDGE_TOKEN:-}
      # fal.ai reference-conditioned launch media — image: nano-banana-2 edit (the brand's REAL product
      # photo from research, not an invented one); video: Veo 3 product-hero reveal. Models are
      # operator-settable in Settings → Media (fal_image_model / fal_video_model); these are the fallbacks.
      - FAL_KEY=${FAL_KEY:-}
      - FAL_EDIT_MODEL=${FAL_EDIT_MODEL:-fal-ai/nano-banana-2/edit}
      - FAL_VIDEO_MODEL=${FAL_VIDEO_MODEL:-fal-ai/veo3/image-to-video}
      # Research enrichment keys (from gitignored .env). OpenRouter = reasoning/planner for the
      # last30days social-research skill; Tavily = the worker's web-search provider (upgrades the
      # keyless DuckDuckGo default). Empty if unset → falls back to prior behaviour.
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - POSTIZ_API_URL=${POSTIZ_API_URL:-http://localhost:4007/api/public/v1}
      - POSTIZ_API_KEY=${POSTIZ_API_KEY}   # studio is a Postiz API client; Postiz holds the platform tokens (§2c)
      # §3d engagement (pull model): the worker polls the Chatwoot inbox each tick and queues on-brand
      # reply-drafts for new inbound messages (operator still sends every reply). Host-network container,
      # so Chatwoot is localhost:4009. Empty token/account = polling no-ops. Webhooks aren't used —
      # Chatwoot's anti-SSRF guard refuses to POST to a private-LAN address.
      - CHATWOOT_URL=${CHATWOOT_WORKER_URL:-http://localhost:4009}
      - CHATWOOT_API_TOKEN=${CHATWOOT_API_TOKEN:-}
      - CHATWOOT_ACCOUNT_ID=${CHATWOOT_ACCOUNT_ID:-}
      - CHATWOOT_DEFAULT_BRAND=${CHATWOOT_DEFAULT_BRAND:-}
      - STUDIO_COCKPIT_URL=${STUDIO_COCKPIT_URL:-http://172.18.18.101:4008}  # for Telegram "Preview in cockpit" tap-throughs
      # Hermes' own dashboard on the LAN (operator's local network). Exposes config + API keys,
      # so it is gated by basic auth (dashboard.basic_auth in ~/.hermes/config.yaml). Interim —
      # plan §7a wants this on Tailscale, not the LAN; move it there before any wider exposure.
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0    # bind all interfaces -> reachable at http://<box-LAN-IP>:9119
      - HERMES_DASHBOARD_INSECURE=1      # required to bind non-localhost (auth above is the guard)
    volumes:
      - ${HOME}/.hermes:/opt/data        # Hermes: config.yaml, memories/, skills/, auth.json, .env, logs/
      - ./studio-data:/opt/studio        # studio job store (SQLite) — separate from Hermes's own memory
      - ./plugins:/opt/data/plugins      # studio plugin source (version-controlled in repo)
      - ./config/SOUL.md:/opt/data/SOUL.md  # Constance's persona — version-controlled here, not just ~/.hermes
    # Phase 0 deliberately omits: HERMES_DASHBOARD (that is Hermes's own dash, not our §7a cockpit),
    # the gateway API server (loopback-only is fine), and resource limits. Added later only when needed.

  # §7a custom studio cockpit (Phase 1) — Next.js, reads the shared studio SQLite DB directly.
  # Separate bridge-network service with a published LAN port; talks to the same ./studio-data file.
  dashboard:
    build: ./dashboard
    container_name: studio-dashboard
    restart: unless-stopped
    user: "1000:1000"                  # match host hermes uid so the shared studio.db stays writable
    environment:
      - STUDIO_DB_PATH=/opt/studio/studio.db
      - ZAR_PER_USD=${ZAR_PER_USD:-16.28}              # cost ledger shows Rands; API costs are USD. Update the rate as it moves.
      - DASH_USER=${DASH_USER}                          # single-operator login (Phase 1 thin auth, §7a)
      - DASH_PASSWORD_HASH_B64=${DASH_PASSWORD_HASH_B64} # base64 of the bcrypt hash ($ breaks compose interpolation)
      - SESSION_SECRET=${SESSION_SECRET}                # iron-session cookie encryption key
      - COOKIE_SECURE=false                        # over HTTP/LAN; flip true behind HTTPS/Tailscale
      - POSTIZ_API_KEY=${POSTIZ_API_KEY}           # publish approved drafts via Postiz (human-clicked)
      - POSTIZ_API_URL=http://host.docker.internal:4007/api/public/v1
      - POSTIZ_JWT_SECRET=${POSTIZ_JWT_SECRET}     # mints the `auth` token for Postiz's internal API (calendar drag-reschedule). MUST equal postiz/.env JWT_SECRET.
      - POSTIZ_USER_ID=${POSTIZ_USER_ID}           # operator's Postiz user id (the minted token's subject)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}   # DM the operator when a post goes live (two-way loop)
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # §3d engagement engine — Chatwoot (runs from chatwoot/docker-compose.yml on :4009). Set the
      # token + account id in .env after creating them in the Chatwoot UI; empty = the Engagement
      # page shows setup steps instead of an inbox.
      - CHATWOOT_URL=${CHATWOOT_URL:-http://host.docker.internal:4009}            # server-side API calls
      - CHATWOOT_PUBLIC_URL=${CHATWOOT_PUBLIC_URL:-http://172.18.18.101:4009}     # browser-facing "Open Chatwoot" links (LAN)
      - CHATWOOT_API_TOKEN=${CHATWOOT_API_TOKEN:-}
      - CHATWOOT_ACCOUNT_ID=${CHATWOOT_ACCOUNT_ID:-}
      - CHATWOOT_WEBHOOK_TOKEN=${CHATWOOT_WEBHOOK_TOKEN:-}   # shared secret Chatwoot carries in ?token= when it calls /api/engagement/webhook (proactive drafting)
      - CHATWOOT_DEFAULT_BRAND=${CHATWOOT_DEFAULT_BRAND:-}   # brand voice inbound replies draft in; empty = sole brand, else "unassigned"
      # § funnels — Mautic (runs from mautic/docker-compose.yml on :4010). Browser-reachable LAN URL
      # the /funnels page iframes (the real Mautic UI embedded in the desk).
      - MAUTIC_PUBLIC_URL=${MAUTIC_PUBLIC_URL:-http://172.18.18.101:4010}
      # Mautic REST API — server-side calls so the native Funnels pages render Mautic data in the
      # studio's own UI (no Mautic login for the operator). Creds in the gitignored root .env.
      - MAUTIC_API_URL=${MAUTIC_API_URL:-http://host.docker.internal:4010}
      - MAUTIC_API_USER=${MAUTIC_API_USER:-}
      - MAUTIC_API_PASSWORD=${MAUTIC_API_PASSWORD:-}
      # shared token Typebot/flows present when POSTing captured leads to /api/funnels/capture
      - FUNNEL_CAPTURE_TOKEN=${FUNNEL_CAPTURE_TOKEN:-}
      # § flows — Typebot visual funnel builder (runs from typebot/docker-compose.yml). Builder is
      # framed at /flows via its X-Frame-Options-stripping proxy (:4011); Mailpit (:4013) is the
      # local login inbox where the magic-link sign-in arrives.
      - TYPEBOT_PUBLIC_URL=${TYPEBOT_PUBLIC_URL:-http://172.18.18.101:4011}
      - TYPEBOT_MAILPIT_URL=${TYPEBOT_MAILPIT_URL:-http://172.18.18.101:4013}
      # §SSO — the studio is the single OIDC identity provider; embedded apps (Typebot now) delegate
      # login here and auto-provision by email. Secrets/keys live in the gitignored root .env.
      - STUDIO_OIDC_ISSUER=${STUDIO_OIDC_ISSUER:-http://172.18.18.101:4008/api/oidc}
      - STUDIO_OIDC_CLIENT_ID=${STUDIO_OIDC_CLIENT_ID:-}
      - STUDIO_OIDC_CLIENT_SECRET=${STUDIO_OIDC_CLIENT_SECRET:-}
      - STUDIO_OIDC_REDIRECT_URIS=${STUDIO_OIDC_REDIRECT_URIS:-}
      - STUDIO_OIDC_PRIVATE_KEY_B64=${STUDIO_OIDC_PRIVATE_KEY_B64:-}
      - OPERATOR_EMAIL=${OPERATOR_EMAIL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"        # reach Postiz's host-published port from this bridge container
    volumes:
      - ./studio-data:/opt/studio      # the shared studio job store (same file the plugin writes)
    ports:
      - "4008:3000"                    # LAN cockpit at http://<box-LAN-IP>:4008

  # Video render service (§7b) — Remotion (branded composition, headless Chromium) +
  # ffmpeg. Turns a draft's image + caption into a per-platform vertical/landscape
  # video. Internal only: bound to loopback; the studio plugin (host net) POSTs to it.
  renderer:
    build: ./renderer
    container_name: studio-renderer
    restart: unless-stopped
    shm_size: "1gb"                    # Chromium needs shared memory for rendering
    environment:
      # Voiceover TTS: ElevenLabs (natural) when the key is set, else local Piper. Voice/model optional.
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-}
      - ELEVENLABS_VOICE_ID_RU=${ELEVENLABS_VOICE_ID_RU:-}
      - ELEVENLABS_MODEL=${ELEVENLABS_MODEL:-}
      - ELEVENLABS_MODEL_NONEN=${ELEVENLABS_MODEL_NONEN:-}
    ports:
      - "127.0.0.1:3100:3100"          # loopback only; reached by the host-net hermes container

  # Knowledge base (Karpathy LLM-wiki pattern) — Basic Memory: local markdown knowledge graph the
  # operator's history/artifacts compile into, served to LLMs over MCP. Stores plain markdown on the
  # SHARED studio-data/knowledge dir, so Hermes (host net, via the MCP/SSE port) and the dashboard
  # (reads the files directly off /opt/studio/knowledge) both see the same brain. Pinned off :latest.
  basic-memory:
    image: ghcr.io/basicmachines-co/basic-memory@sha256:0da35f465fed7b58b6c2e31e7c0dbcbc728760a1b6a71857cfe3ced847c727a1
    container_name: basic-memory
    restart: unless-stopped
    environment:
      - BASIC_MEMORY_DEFAULT_PROJECT=main
      - BASIC_MEMORY_SYNC_CHANGES=true       # watch + re-index the markdown dir on change (picks up our imports)
      - BASIC_MEMORY_LOG_LEVEL=INFO
    user: "1000:1000"                        # image's appuser is uid 1000 (== host hermes); keeps shared files writable
    volumes:
      # The "main" project home is {PROJECT_ROOT}/basic-memory = /app/data/basic-memory; mount our
      # shared knowledge dir THERE so dropped/imported notes land in the project (== /opt/studio/knowledge).
      - ./studio-data/knowledge:/app/data/basic-memory
      - ./studio-data/bm-config:/home/appuser/.basic-memory   # its search index + config (bind mount, owned by 1000)
    ports:
      - "127.0.0.1:8808:8000"                # SSE MCP; reached by the host-network hermes at http://localhost:8808
    command: ["basic-memory", "mcp", "--transport", "sse", "--host", "0.0.0.0", "--port", "8000"]
